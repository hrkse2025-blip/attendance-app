<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Attendance App</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
}
.app{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:25px;
padding:20px;
color:#fff;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.top{
text-align:center;
margin-bottom:20px;
}
.top h1{
font-size:28px;
margin-bottom:5px;
}
.top p{
font-size:14px;
opacity:0.8;
}
.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:20px;
margin-bottom:15px;
}
input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
margin-bottom:12px;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#00c6ff;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}
button:hover{
background:#0072ff;
}
.list{
max-height:250px;
overflow:auto;
}
.item{
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:14px;
margin-bottom:10px;
font-size:14px;
}
.bottom{
display:flex;
justify-content:space-around;
margin-top:15px;
padding-top:10px;
border-top:1px solid rgba(255,255,255,0.2);
font-size:14px;
}
.stat{
text-align:center;
}
</style>
</head>
<body>

<div class="app">
<div class="top">
<h1>📘 Attendance App</h1>
<p>Blue Premium Edition</p>
</div>

<div class="card">
<input type="text" id="name" placeholder="Enter Student Name">
<button onclick="markAttendance()">Mark Attendance</button>
<button onclick="downloadCSV()">Download Excel</button>
</div>

<div class="list" id="list"></div>

<div class="bottom">
<div class="stat">
<h3 id="count">0</h3>
<p>Total</p>
</div>
<div class="stat">
<h3>100%</h3>
<p>Ready</p>
</div>
<div class="stat">
<h3>✔</h3>
<p>Saved</p>
</div>
</div>
</div>

<script>
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];

function showData(){
let list = document.getElementById("list");
list.innerHTML="";
attendance.forEach(item=>{
list.innerHTML += `
<div class="item">
<b>${item.name}</b><br>
${item.date} | ${item.time}
</div>
`;
});
document.getElementById("count").innerText = attendance.length;
}

function markAttendance(){
let name = document.getElementById("name").value.trim();
if(name==""){
alert("Enter Name");
return;
}
let now = new Date();
let date = now.toLocaleDateString();
let time = now.toLocaleTimeString();

let already = attendance.find(x => x.name.toLowerCase()==name.toLowerCase() && x.date==date);

if(already){
alert("Already Marked Today");
return;
}

attendance.push({name,date,time});
localStorage.setItem("attendance",JSON.stringify(attendance));
document.getElementById("name").value="";
showData();
}

function downloadCSV(){
let csv="Name,Date,Time\n";
attendance.forEach(x=>{
csv += `${x.name},${x.date},${x.time}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="attendance.csv";
a.click();
}

showData();
</script>

</body>
</html>
