<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Enterprises - Smart Attendance</title>
    <style>
        :root { --dark: #1a1a1a; --card: #2d2d2d; --green: #2ecc71; --orange: #e67e22; --text: #f5f5f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #f1c40f; margin-bottom: 20px; font-size: 1.5rem; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 15px; box-sizing: border-box; }
        .btn-add { background: #3498db; color: white; }
        .btn-present { background: var(--green); color: white; }
        .btn-absent { background: var(--orange); color: white; }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        #live-status { background: #fff; color: #333; padding: 15px; border-radius: 10px; min-height: 200px; }
        .status-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
        .Present { color: #27ae60; font-weight: bold; }
        .Absent { color: #c0392b; font-weight: bold; }
        .time-tag { font-size: 11px; color: #7f8c8d; display: block; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<h1 style="text-align: center; color: #f1c40f;">KS ENTERPRISES</h1>

<div class="grid">
    <div class="card">
        <h2>Employee Side</h2>
        <p style="font-size: 12px; color: #aaa;">Admin: Add New Staff</p>
        <input type="text" id="newEmpName" placeholder="Enter Full Name">
        <button class="btn-add" onclick="registerEmployee()">Add Employee</button>

        <hr style="border: 0.5px solid #444; margin: 25px 0;">

        <label>Select Your Name:</label>
        <select id="empDropdown">
            <option>Loading...</option>
        </select>
        
        <div id="action-buttons">
            <button class="btn-present" id="pBtn" onclick="markAttendance('Present')">MARK PRESENT</button>
            <button class="btn-absent" id="aBtn" onclick="markAttendance('Absent')">MARK ABSENT</button>
        </div>
        <p id="msg" style="text-align: center; color: #f1c40f; font-weight: bold;"></p>
    </div>

    <div class="card">
        <h2>Admin Live Status</h2>
        <p id="todayDate" style="text-align: center; font-weight: bold; margin-bottom: 15px;"></p>
        <div id="live-status">Loading live records...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const todayStr = new Date().toLocaleDateString('en-GB');
    document.getElementById('todayDate').innerText = "Today: " + todayStr;

    // 1. Register Employee
    window.registerEmployee = async () => {
        const val = document.getElementById('newEmpName').value.trim();
        if(!val) return alert("Enter name!");
        await addDoc(collection(db, "employees"), { name: val });
        document.getElementById('newEmpName').value = "";
        alert("Employee Added!");
    };

    // 2. Load Dropdown
    onSnapshot(collection(db, "employees"), (snap) => {
        const sel = document.getElementById('empDropdown');
        sel.innerHTML = '<option value="">-- Choose Name --</option>';
        snap.forEach(doc => {
            sel.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
        });
    });

    // 3. Mark Attendance with One-Time Check
    window.markAttendance = async (status) => {
        const name = document.getElementById('empDropdown').value;
        if(!name) return alert("Select name!");

        // Duplicate Check
        const qCheck = query(collection(db, "attendance"), where("employeeName", "==", name), where("date", "==", todayStr));
        const existing = await getDocs(qCheck);
        
        if(!existing.empty) {
            alert("Aapki attendance aaj ki pehle se lag chuki hai!");
            return;
        }

        try {
            await addDoc(collection(db, "attendance"), {
                employeeName: name,
                status: status,
                date: todayStr,
                timestamp: serverTimestamp()
            });
            alert("Attendance Done: " + status);
        } catch(e) { alert("Error: " + e.message); }
    };

    // 4. Admin Live View (Sorted by Time)
    const qLive = query(collection(db, "attendance"), where("date", "==", todayStr));
    onSnapshot(qLive, (snap) => {
        const statusDiv = document.getElementById('live-status');
        if(snap.empty) { statusDiv.innerHTML = "No records yet."; return; }

        let html = "";
        let dataList = [];
        snap.forEach(doc => dataList.push(doc.data()));
        
        // Sort: Latest on top
        dataList.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

        dataList.forEach(data => {
            const time = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Waiting...';
            html += `
                <div class="status-item">
                    <span>
                        <b>${data.employeeName}</b>
                        <span class="time-tag">Time: ${time}</span>
                    </span>
                    <span class="${data.status}">${data.status.toUpperCase()}</span>
                </div>`;
        });
        statusDiv.innerHTML = html;
    });
</script>

</body>
</html>
