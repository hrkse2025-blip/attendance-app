<!DOCTYPE html>
<html>
<head>
<title>Attendance App</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}
.box{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input{
padding:10px;
width:60%;
}
button{
padding:10px;
background:blue;
color:white;
border:none;
cursor:pointer;
}
li{
margin:10px 0;
}
</style>
</head>

<body>
<div class="box">
<h1>Attendance App 🚀</h1>

<input type="text" id="name" placeholder="Enter Name">
<button onclick="add()">Mark Present</button>

<ul id="list"></ul>
</div>

<script>
function add(){
let name=document.getElementById("name").value;
if(name=="") return;

document.getElementById("list").innerHTML +=
"<li>"+name+" - Present</li>";

document.getElementById("name").value="";
}
</script>
</body>
</html>
