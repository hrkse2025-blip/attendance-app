<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#74ebd5,#ACB6E5);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
width:95%;
max-width:800px;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

.input-box{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input{
flex:1;
padding:12px;
border:2px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#45a049;
}

.download{
background:#2196F3;
}

.download:hover{
background:#0b7dda;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

.total{
margin-top:15px;
font-weight:bold;
color:#333;
}
</style>
</head>
<body>

<div class="container">
<h1>🚀 Attendance App</h1>

<div class="input-box">
<input type="text" id="name" placeholder="Enter Student Name">
<button onclick="markAttendance()">Mark Present</button>
<button class="download" onclick="downloadCSV()">Download Excel</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="total" id="total"></div>

</div>

<script>
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];

showData();

function markAttendance(){
let name = document.getElementById("name").value.trim();

if(name==""){
alert("Enter Name");
return;
}

let today = new Date();
let date = today.toLocaleDateString();
let time = today.toLocaleTimeString();

let already = attendance.find(item => item.name.toLowerCase()==name.toLowerCase() && item.date==date);

if(already){
alert("Attendance already marked today");
return;
}

attendance.push({
name:name,
date:date,
time:time,
status:"Present"
});

localStorage.setItem("attendance",JSON.stringify(attendance));

document.getElementById("name").value="";
showData();
}

function showData(){
let table = document.getElementById("tableBody");
table.innerHTML="";

attendance.forEach(item=>{
table.innerHTML += `
<tr>
<td>${item.name}</td>
<td>${item.date}</td>
<td>${item.time}</td>
<td>${item.status}</td>
</tr>
`;
});

document.getElementById("total").innerText="Total Present: " + attendance.length;
}

function downloadCSV(){
let csv = "Name,Date,Time,Status\n";

attendance.forEach(item=>{
csv += `${item.name},${item.date},${item.time},${item.status}\n`;
});

let blob = new Blob([csv], {type:"text/csv"});
let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "attendance.csv";
link.click();
}
</script>

</body>
</html>
