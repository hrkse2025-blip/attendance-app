<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Enterprises - Live Attendance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; color: white; text-align: center; }
        .container { max-width: 400px; margin: 20px auto; background: #34495e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background-color: #1abc9c; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #16a085; }
        .status-box { background: rgba(255,255,255,0.1); padding: 10px; margin-top: 20px; text-align: left; height: 250px; overflow-y: auto; }
        .entry { border-bottom: 1px solid #555; padding: 8px; font-size: 14px; }
        .present { color: #2ecc71; } .absent { color: #e74c3c; }
    </style>
</head>
<body>

    <h2>KS ENTERPRISES</h2>

    <div class="container">
        <h3>Add New Employee</h3>
        <input type="text" id="empName" placeholder="Enter Employee Name">
        <button onclick="addEmployee()">Add Employee</button>
    </div>

    <div class="container">
        <h3>Mark Attendance</h3>
        <select id="empList"><option>Loading Employees...</option></select>
        <button onclick="markStatus('Present')">Mark Present</button>
        <button style="background-color: #e67e22;" onclick="markStatus('Absent')">Mark Absent</button>
    </div>

    <div class="container">
        <h3>Today's Live Status</h3>
        <div id="liveStatus" class="status-box">No records yet.</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // REPLACE THIS WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Add Employee to DB
        function addEmployee() {
            const name = document.getElementById('empName').value;
            if(name) {
                db.ref('employees/').push(name);
                document.getElementById('empName').value = '';
                alert("Employee Added!");
            }
        }

        // 2. Fetch Employee List for Dropdown
        db.ref('employees/').on('value', (snap) => {
            const list = document.getElementById('empList');
            list.innerHTML = "";
            snap.forEach((child) => {
                list.innerHTML += `<option value="${child.val()}">${child.val()}</option>`;
            });
        });

        // 3. Mark Attendance (Cloud Pe Save Hoga)
        function markStatus(status) {
            const name = document.getElementById('empList').value;
            const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
            const time = new Date().toLocaleTimeString();

            db.ref('attendance/' + today + '/' + name).set({
                status: status,
                time: time
            });
            alert(name + " marked " + status);
        }

        // 4. Live Update (Admin Screen)
        const todayStr = new Date().toISOString().split('T')[0];
        db.ref('attendance/' + todayStr).on('value', (snap) => {
            const statusDiv = document.getElementById('liveStatus');
            statusDiv.innerHTML = "";
            if(!snap.exists()) { statusDiv.innerHTML = "No attendance marked today."; return; }
            
            snap.forEach((child) => {
                const data = child.val();
                const colorClass = data.status === 'Present' ? 'present' : 'absent';
                statusDiv.innerHTML += `
                    <div class="entry">
                        <strong>${child.key}</strong> - 
                        <span class="${colorClass}">${data.status}</span> 
                        <br><small>${data.time}</small>
                    </div>`;
            });
        });
    </script>
</body>
</html>
