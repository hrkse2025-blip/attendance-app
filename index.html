<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS ENTERPRISES Attendance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
padding:15px;color:#fff;
}
.app{
max-width:420px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}
h1{text-align:center;margin-bottom:15px}
.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}
input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
font-size:16px;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00c6ff;
color:#fff;
font-size:16px;
margin-bottom:8px;
cursor:pointer;
}
button:hover{background:#0072ff}
.list{
max-height:250px;
overflow:auto;
}
.item{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
margin-bottom:8px;
font-size:14px;
}
small{opacity:0.8}
</style>
</head>
<body>

<div class="app">
<h1>KS ENTERPRISES</h1>

<div class="card">
<h3>Add Employee</h3>
<input type="text" id="empName" placeholder="Enter employee name">
<button onclick="addEmployee()">Add Employee</button>
</div>

<div class="card">
<h3>Employee Attendance</h3>
<select id="employeeList"></select>
<button onclick="mark('Present')">Mark Present</button>
<button onclick="mark('Absent')">Mark Absent</button>
</div>

<div class="card">
<h3>Today's Status</h3>
<div class="list" id="records"></div>
<button onclick="downloadCSV()">Download Excel</button>
</div>

</div>

<script>
let employees = JSON.parse(localStorage.getItem("employees")) || [];
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];

function save(){
localStorage.setItem("employees",JSON.stringify(employees));
localStorage.setItem("attendance",JSON.stringify(attendance));
}

function addEmployee(){
let name=document.getElementById("empName").value.trim();
if(name==""){alert("Enter Name");return;}
if(employees.includes(name)){alert("Already Added");return;}
employees.push(name);
save();
document.getElementById("empName").value="";
loadEmployees();
}

function loadEmployees(){
let list=document.getElementById("employeeList");
list.innerHTML="";
employees.forEach(name=>{
list.innerHTML += `<option>${name}</option>`;
});
}

function mark(status){
let name=document.getElementById("employeeList").value;
if(!name){alert("No Employee");return;}

let today=new Date().toLocaleDateString();
let time=new Date().toLocaleTimeString();

let already=attendance.find(x=>x.name==name && x.date==today);
if(already){
alert("Attendance Already Marked Today");
return;
}

attendance.push({name,status,date:today,time});
save();
showRecords();
}

function showRecords(){
let box=document.getElementById("records");
box.innerHTML="";
let today=new Date().toLocaleDateString();

employees.forEach(emp=>{
let rec=attendance.find(x=>x.name==emp && x.date==today);

if(rec){
box.innerHTML += `
<div class="item">
<b>${rec.name}</b><br>
${rec.status} <br>
<small>${rec.time}</small>
</div>`;
}else{
box.innerHTML += `
<div class="item">
<b>${emp}</b><br>
Pending
</div>`;
}
});
}

function downloadCSV(){
let csv="Name,Status,Date,Time\n";
attendance.forEach(x=>{
csv += `${x.name},${x.status},${x.date},${x.time}\n`;
});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="attendance.csv";
a.click();
}

loadEmployees();
showRecords();
</script>

</body>
</html>
