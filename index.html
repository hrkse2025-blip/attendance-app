<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Enterprises - Attendance System</title>
    <style>
        :root { --dark: #2c3e50; --green: #27ae60; --orange: #e67e22; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: #34495e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #f1c40f; border-bottom: 2px solid #555; padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--green); color: white; }
        .btn-present { background: #2ecc71; color: white; }
        .btn-absent { background: var(--orange); color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        #live-status { background: var(--light); color: #333; padding: 15px; border-radius: 8px; max-height: 400px; overflow-y: auto; }
        .status-item { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 8px 0; }
        .Present { color: green; font-weight: bold; }
        .Absent { color: red; font-weight: bold; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<h1 style="text-align: center;">KS ENTERPRISES - LIVE DASHBOARD</h1>

<div class="grid">
    <div class="card">
        <h2>Employee Side</h2>
        
        <label>Add New Employee (Admin Only)</label>
        <input type="text" id="newEmpName" placeholder="Enter Full Name">
        <button class="btn-add" onclick="registerEmployee()">Register Employee</button>

        <hr style="margin: 20px 0; opacity: 0.3;">

        <label>Select Your Name</label>
        <select id="empDropdown">
            <option>Loading names...</option>
        </select>
        
        <button class="btn-present" onclick="markAttendance('Present')">MARK PRESENT</button>
        <button class="btn-absent" onclick="markAttendance('Absent')">MARK ABSENT</button>
    </div>

    <div class="card">
        <h2>Admin Live Status</h2>
        <p id="todayDate" style="text-align: center; font-weight: bold;"></p>
        <div id="live-status">
            Loading live records...
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- APNI FIREBASE CONFIG YAHAN DALEIN ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const todayDateStr = new Date().toLocaleDateString('en-GB'); // Format: DD/MM/YYYY
    document.getElementById('todayDate').innerText = "Date: " + todayDateStr;

    // 1. Load Employees in Dropdown (Real-time)
    onSnapshot(collection(db, "employees"), (snapshot) => {
        const select = document.getElementById('empDropdown');
        select.innerHTML = '<option value="">-- Choose Your Name --</option>';
        snapshot.forEach(doc => {
            let name = doc.data().name;
            select.innerHTML += `<option value="${name}">${name}</option>`;
        });
    });

    // 2. Register New Employee
    window.registerEmployee = async () => {
        const nameInput = document.getElementById('newEmpName');
        if(!nameInput.value) return alert("Please enter a name");
        
        try {
            await addDoc(collection(db, "employees"), { name: nameInput.value });
            alert("Employee registered successfully!");
            nameInput.value = "";
        } catch(e) { alert("Error: " + e.message); }
    };

    // 3. Mark Attendance
    window.markAttendance = async (status) => {
        const name = document.getElementById('empDropdown').value;
        if(!name) return alert("Please select a name first!");

        try {
            await addDoc(collection(db, "attendance"), {
                employeeName: name,
                status: status,
                date: todayDateStr,
                timestamp: serverTimestamp()
            });
            alert("Attendance marked: " + status);
        } catch(e) { alert("Error: " + e.message); }
    };

    // 4. ADMIN VIEW: Live Status Update (Today Only)
    const q = query(
        collection(db, "attendance"), 
        where("date", "==", todayDateStr)
    );

    onSnapshot(q, (snapshot) => {
        const statusDiv = document.getElementById('live-status');
        if(snapshot.empty) {
            statusDiv.innerHTML = "No attendance marked yet today.";
            return;
        }

        statusDiv.innerHTML = "";
        // Sort manually since we can't use complex indexes easily on first run
        let records = [];
        snapshot.forEach(doc => records.push(doc.data()));
        
        records.forEach(data => {
            statusDiv.innerHTML += `
                <div class="status-item">
                    <span>${data.employeeName}</span>
                    <span class="${data.status}">${data.status}</span>
                </div>
            `;
        });
    });
</script>

</body>
</html>
