<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Enterprises - Attendance</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: white; text-align: center; }
        .container { max-width: 400px; margin: 50px auto; background: #34495e; padding: 20px; border-radius: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { cursor: pointer; font-weight: bold; }
        .btn-add { background: #27ae60; color: white; }
        .btn-present { background: #2ecc71; color: white; }
        .btn-absent { background: #e67e22; color: white; }
        #status-list { background: #ecf0f1; color: #333; padding: 10px; border-radius: 5px; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h2>KS ENTERPRISES</h2>
    
    <h3>Add New Employee</h3>
    <input type="text" id="empName" placeholder="Enter Employee Name">
    <button class="btn-add" onclick="addNewEmployee()">Add Employee</button>

    <hr>

    <h3>Mark Attendance</h3>
    <select id="empSelect">
        <option value="">Loading Employees...</option>
    </select>
    <button class="btn-present" onclick="markAttendance('Present')">Mark Present</button>
    <button class="btn-absent" onclick="markAttendance('Absent')">Mark Absent</button>

    <hr>

    <h3>Today's Live Status</h3>
    <div id="status-list">No records yet.</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. APNI DETAILS YAHAN DALEIN
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. Employees Load Karna (Dropdown ke liye)
    const empSelect = document.getElementById('empSelect');
    onSnapshot(collection(db, "employees"), (snapshot) => {
        empSelect.innerHTML = '<option value="">Select Employee</option>';
        snapshot.forEach((doc) => {
            let emp = doc.data();
            let option = document.createElement('option');
            option.value = emp.name;
            option.textContent = emp.name;
            empSelect.appendChild(option);
        });
    });

    // 3. Naya Employee Add Karna
    window.addNewEmployee = async () => {
        const name = document.getElementById('empName').value;
        if (!name) return alert("Naam likhiye!");
        
        try {
            await addDoc(collection(db, "employees"), { name: name });
            alert("Employee Added!");
            document.getElementById('empName').value = "";
        } catch (e) { console.error("Error: ", e); }
    };

    // 4. Attendance Mark Karna
    window.markAttendance = async (status) => {
        const name = empSelect.value;
        if (!name) return alert("Employee select karein!");
        
        const today = new Date().toLocaleDateString();
        await addDoc(collection(db, "attendance"), {
            name: name,
            status: status,
            date: today
        });
        alert(name + " marked as " + status);
    };

    // 5. Today's Status Dikhana
    const statusDiv = document.getElementById('status-list');
    const todayStr = new Date().toLocaleDateString();
    const q = query(collection(db, "attendance"), where("date", "==", todayStr));

    onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
            statusDiv.innerHTML = "No records yet.";
            return;
        }
        statusDiv.innerHTML = "";
        snapshot.forEach((doc) => {
            let data = doc.data();
            statusDiv.innerHTML += `<p><b>${data.name}</b>: ${data.status}</p>`;
        });
    });
</script>

</body>
</html>
