<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Staff - Attendance</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .card { background: #2d2d2d; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        .btn-p { background: #2ecc71; color: white; font-weight: bold; }
        .btn-a { background: #e67e22; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <h2>KS ENTERPRISES</h2>
    <div class="card">
        <h3>Mark Your Attendance</h3>
        <select id="empDropdown"><option>Loading...</option></select>
        <button class="btn-p" onclick="markAttendance('Present')">MARK PRESENT</button>
        <button class="btn-a" onclick="markAttendance('Absent')">MARK ABSENT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* APNI CONFIG YAHAN DALEIN */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const todayStr = new Date().toLocaleDateString('en-GB');

        onSnapshot(collection(db, "employees"), (snap) => {
            const sel = document.getElementById('empDropdown');
            sel.innerHTML = '<option value="">-- Apna Naam Chune --</option>';
            snap.forEach(doc => sel.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
        });

        window.markAttendance = async (status) => {
            const name = document.getElementById('empDropdown').value;
            if(!name) return alert("Pehle naam select karein!");

            const q = query(collection(db, "attendance"), where("employeeName", "==", name), where("date", "==", todayStr));
            const existing = await getDocs(q);
            if(!existing.empty) return alert("Aapki attendance aaj ki pehle se lag chuki hai!");

            await addDoc(collection(db, "attendance"), { employeeName: name, status: status, date: todayStr, timestamp: serverTimestamp() });
            alert("Attendance Done!");
        };
    </script>
</body>
</html>
